name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm test

      # Build needs placeholder env so module scope doesn't crash; nothing connects.
      - run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-secret
          BETTER_AUTH_URL: http://localhost:3000
          MOONSHOT_API_KEY: ci-build-key
